<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ブロック崩しゲーム</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --panel: rgba(15, 23, 42, 0.82);
      --line: rgba(255, 255, 255, 0.12);
      --text: #e5eefc;
      --sub: #b7c3d9;
      --accent: #60a5fa;
      --accent2: #22c55e;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 24px 16px 32px;
      flex: 1 0 auto;
    }

    .title-box,
    .info-box,
    .control-box,
    .game-box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .title-box {
      padding: 20px;
      margin-bottom: 16px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 34px);
    }

    .lead {
      margin: 0;
      color: var(--sub);
      line-height: 1.7;
      font-size: 14px;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .info-box,
    .control-box {
      padding: 16px;
    }

    .status-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .status-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.04);
      text-align: center;
    }

    .status-label {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 6px;
    }

    .status-value {
      font-size: 24px;
      font-weight: 700;
    }

    .control-box h2,
    .info-box h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .controls {
      margin: 0;
      padding-left: 18px;
      color: var(--sub);
      line-height: 1.8;
      font-size: 14px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .level-select {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .level-btn {
      min-width: 110px;
    }

    .level-btn.active {
      background: linear-gradient(135deg, var(--accent2), #16a34a);
      color: white;
      border: none;
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.22) inset;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: white;
    }

    .secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .game-box {
      padding: 16px;
    }

    .canvas-wrap {
      background: #020617;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: linear-gradient(180deg, #0b1228 0%, #09101d 100%);
      touch-action: none;
    }

    .message {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      color: var(--sub);
      line-height: 1.7;
      min-height: 54px;
    }

    .mobile-pad {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .mobile-pad button {
      padding: 16px;
      font-size: 18px;
      border-radius: 14px;
    }

    .clear-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
      color: white;
      text-align: center;
      padding: 24px;
    }

    .clear-title {
      font-size: clamp(34px, 7vw, 56px);
      font-weight: 800;
      color: #60a5fa;
      margin-bottom: 10px;
      letter-spacing: 0.06em;
    }

    .clear-subtitle {
      font-size: 20px;
      color: #e5eefc;
      margin-bottom: 20px;
    }

    .site-footer {
      width: 100%;
      margin-top: 40px;
      padding: 20px 0;
      text-align: center;
      background: linear-gradient(180deg, #111827, #0b1220);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .footer-inner {
      color: var(--sub);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    @media (max-width: 800px) {
      .top-grid {
        grid-template-columns: 1fr;
      }

      .status-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .mobile-pad {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="title-box">
      <h1>ブロック崩しゲーム</h1>
      <p class="lead">
        シンプルな 1 人用ブロック崩しです。<br>
        キーボードでもスマホのタッチボタンでも遊べます。
      </p>
    </section>

    <div class="top-grid">
      <section class="info-box">
        <h2>ゲーム情報</h2>
        <div class="status-row">
          <div class="status-card">
            <div class="status-label">スコア</div>
            <div class="status-value" id="score">0</div>
          </div>
          <div class="status-card">
            <div class="status-label">残機</div>
            <div class="status-value" id="lives">3</div>
          </div>
          <div class="status-card">
            <div class="status-label">レベル</div>
            <div class="status-value" id="level">1</div>
          </div>
          <div class="status-card">
            <div class="status-label">コンテニュー</div>
            <div class="status-value" id="continueCount">1</div>
          </div>
        </div>
        <div class="level-select">
          <button class="secondary level-btn active" id="easyBtn" data-level="1">EASY</button>
          <button class="secondary level-btn" id="normalBtn" data-level="2">NORMAL</button>
          <button class="secondary level-btn" id="hardBtn" data-level="3">HARD</button>
        </div>
      </section>

      <section class="control-box">
        <h2>操作方法</h2>
        <ul class="controls">
          <li>PC：← → キーでパドルを移動</li>
          <li>スペースキー：開始 / 再開</li>
          <li>ボールを落とすと残機が 1 つ減ります</li>
          <li>コンテニューは 1 回だけ使えます</li>
        </ul>
        <div class="button-row">
          <button class="primary" id="startBtn">ゲーム開始</button>
          <button class="secondary" id="resetBtn">最初からやり直す</button>
        </div>
      </section>
    </div>

    <section class="game-box">
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="900" height="560"></canvas>
      </div>

      <div class="mobile-pad">
        <button class="secondary" id="leftBtn">◀</button>
        <button class="secondary" id="rightBtn">▶</button>
      </div>

      <div class="message" id="messageBox">難易度を選んで「ゲーム開始」を押すとスタートします。</div>
    </section>
  </div>

  <div id="clearOverlay" class="clear-overlay">
    <div class="clear-title">ALL CLEAR</div>
    <div class="clear-subtitle">HARD MODE COMPLETE</div>
    <button id="replayBtn" class="primary">もう一度遊ぶ</button>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      © 2026 STRAWBERRY ALL RIGHTS RESERVED.
    </div>
  </footer>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const levelEl = document.getElementById('level');
    const continueEl = document.getElementById('continueCount');
    const messageBox = document.getElementById('messageBox');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');
    const easyBtn = document.getElementById('easyBtn');
    const normalBtn = document.getElementById('normalBtn');
    const hardBtn = document.getElementById('hardBtn');
    const clearOverlay = document.getElementById('clearOverlay');
    const replayBtn = document.getElementById('replayBtn');

    const paddle = {
      width: 140,
      height: 16,
      x: canvas.width / 2 - 70,
      y: canvas.height - 42,
      speed: 9
    };

    const ball = {
      x: canvas.width / 2,
      y: canvas.height - 64,
      radius: 10,
      dx: 4,
      dy: -4,
      speedBoost: 0.25
    };

    const brickConfig = {
      rows: 5,
      cols: 9,
      width: 86,
      height: 26,
      gap: 10,
      offsetTop: 70,
      offsetLeft: 28
    };

    let bricks = [];
    let score = 0;
    let lives = 3;
    let level = 1;
    let selectedStartLevel = 1;
    let remainingBlocks = 0;
    let continueAvailable = 1;
    let isRunning = false;
    let isGameOver = false;
    let rightPressed = false;
    let leftPressed = false;
    let animationId = null;

    function setMessage(text) {
      messageBox.textContent = text;
    }

    function updateLevelButtons() {
      [easyBtn, normalBtn, hardBtn].forEach(function(btn) {
        btn.classList.remove('active');
      });

      if (selectedStartLevel === 1) easyBtn.classList.add('active');
      if (selectedStartLevel === 2) normalBtn.classList.add('active');
      if (selectedStartLevel === 3) hardBtn.classList.add('active');
    }

    function updateStatus() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      levelEl.textContent = level;
      continueEl.textContent = continueAvailable;
    }

    function selectStartLevel(nextLevel) {
      selectedStartLevel = nextLevel;
      updateLevelButtons();
      fullReset();
    }

    function createBricks() {
      bricks = [];
      remainingBlocks = 0;

      for (let c = 0; c < brickConfig.cols; c++) {
        bricks[c] = [];
        for (let r = 0; r < brickConfig.rows; r++) {
          bricks[c][r] = {
            x: 0,
            y: 0,
            status: 1,
            hp: level >= 3 && r === 0 ? 2 : 1
          };
          remainingBlocks++;
        }
      }
    }

    function resetBallAndPaddle() {
      paddle.x = canvas.width / 2 - paddle.width / 2;
      ball.x = canvas.width / 2;
      ball.y = canvas.height - 64;
      ball.dx = (Math.random() > 0.5 ? 1 : -1) * (4 + (level - 1) * 0.5);
      ball.dy = -(4 + (level - 1) * 0.5);
    }

    function stopLoop() {
      if (animationId !== null) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }

    function startLoop() {
      stopLoop();
      animationId = requestAnimationFrame(update);
    }

    function fullReset() {
      score = 0;
      lives = 3;
      level = selectedStartLevel;
      continueAvailable = 1;
      isRunning = false;
      isGameOver = false;
      clearOverlay.style.display = 'none';
      createBricks();
      resetBallAndPaddle();
      updateStatus();
      setMessage('難易度を選んで「ゲーム開始」を押すとスタートします。');
      draw();
    }

    function nextLevel() {
      level++;
      if (level > 3) {
        isRunning = false;
        isGameOver = true;
        updateStatus();
        stopLoop();
        draw();
        clearOverlay.style.display = 'flex';
        return;
      }

      createBricks();
      resetBallAndPaddle();
      isRunning = false;
      setMessage('レベル ' + level + ' に進みました。スペースキーまたは開始ボタンで再開できます。');
      updateStatus();
      draw();
    }

    function drawBall() {
      const grad = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 2, ball.x, ball.y, ball.radius);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(1, '#60a5fa');
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.closePath();
    }

    function roundRect(context, x, y, width, height, radius, fill) {
      context.beginPath();
      context.moveTo(x + radius, y);
      context.lineTo(x + width - radius, y);
      context.quadraticCurveTo(x + width, y, x + width, y + radius);
      context.lineTo(x + width, y + height - radius);
      context.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      context.lineTo(x + radius, y + height);
      context.quadraticCurveTo(x, y + height, x, y + height - radius);
      context.lineTo(x, y + radius);
      context.quadraticCurveTo(x, y, x + radius, y);
      context.closePath();
      if (fill) {
        context.fill();
      } else {
        context.stroke();
      }
    }

    function drawPaddle() {
      ctx.fillStyle = '#22c55e';
      roundRect(ctx, paddle.x, paddle.y, paddle.width, paddle.height, 10, true);
    }

    function drawBricks() {
      for (let c = 0; c < brickConfig.cols; c++) {
        for (let r = 0; r < brickConfig.rows; r++) {
          const brick = bricks[c][r];
          if (brick.status !== 1) continue;

          const bx = (c * (brickConfig.width + brickConfig.gap)) + brickConfig.offsetLeft;
          const by = (r * (brickConfig.height + brickConfig.gap)) + brickConfig.offsetTop;
          brick.x = bx;
          brick.y = by;

          const hpColor = brick.hp === 2 ? '#f59e0b' : (r % 2 === 0 ? '#60a5fa' : '#a78bfa');
          ctx.fillStyle = hpColor;
          roundRect(ctx, bx, by, brickConfig.width, brickConfig.height, 8, true);

          ctx.strokeStyle = 'rgba(255,255,255,0.18)';
          ctx.lineWidth = 1;
          roundRect(ctx, bx, by, brickConfig.width, brickConfig.height, 8, false);
        }
      }
    }

    function drawGuide() {
      if (isRunning || isGameOver) return;
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = 'bold 26px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('SPACE キーまたは「ゲーム開始」でスタート', canvas.width / 2, canvas.height / 2);
      ctx.textAlign = 'left';
    }

    function collisionDetection() {
      for (let c = 0; c < brickConfig.cols; c++) {
        for (let r = 0; r < brickConfig.rows; r++) {
          const brick = bricks[c][r];
          if (brick.status !== 1) continue;

          if (
            ball.x > brick.x &&
            ball.x < brick.x + brickConfig.width &&
            ball.y > brick.y &&
            ball.y < brick.y + brickConfig.height
          ) {
            ball.dy = -ball.dy;
            brick.hp -= 1;

            if (brick.hp <= 0) {
              brick.status = 0;
              remainingBlocks--;
              score += 10;
            } else {
              score += 5;
            }

            if (Math.abs(ball.dx) < 9) {
              ball.dx += ball.dx > 0 ? ball.speedBoost : -ball.speedBoost;
            }
            if (Math.abs(ball.dy) < 9) {
              ball.dy += ball.dy > 0 ? ball.speedBoost : -ball.speedBoost;
            }

            updateStatus();

            if (remainingBlocks <= 0) {
              nextLevel();
            }
            return;
          }
        }
      }
    }

    function drawBackground() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
      bg.addColorStop(0, '#0b1228');
      bg.addColorStop(1, '#09101d');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < 30; i++) {
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.beginPath();
        ctx.arc((i * 73) % canvas.width, (i * 41) % canvas.height, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function draw() {
      drawBackground();
      drawBricks();
      drawBall();
      drawPaddle();
      drawGuide();
    }

    function handleLifeLost() {
      lives--;
      updateStatus();

      if (lives <= 0) {
        if (continueAvailable > 0) {
          continueAvailable--;
          lives = 1;
          isRunning = false;
          resetBallAndPaddle();
          updateStatus();
          setMessage('コンテニューしました。スペースキーまたは開始ボタンで再開できます。');
          return;
        }

        isRunning = false;
        isGameOver = true;
        setMessage('ゲームオーバーです。「最初からやり直す」で再挑戦できます。');
        draw();
        stopLoop();
        return;
      }

      isRunning = false;
      resetBallAndPaddle();
      setMessage('ボールを落としてしまいました。スペースキーまたは開始ボタンで再開できます。');
    }

    function update() {
      if (!isRunning) {
        draw();
        animationId = requestAnimationFrame(update);
        return;
      }

      drawBackground();
      drawBricks();
      drawBall();
      drawPaddle();

      collisionDetection();

      if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
        ball.dx = -ball.dx;
      }

      if (ball.y + ball.dy < ball.radius) {
        ball.dy = -ball.dy;
      } else if (ball.y + ball.dy > paddle.y - ball.radius) {
        if (ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
          const hitPos = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
          ball.dy = -Math.abs(ball.dy);
          ball.dx += hitPos * 1.8;
        } else if (ball.y + ball.dy > canvas.height - ball.radius) {
          handleLifeLost();
          if (!isRunning) {
            animationId = requestAnimationFrame(update);
            return;
          }
        }
      }

      if (rightPressed) {
        paddle.x = Math.min(canvas.width - paddle.width, paddle.x + paddle.speed);
      }
      if (leftPressed) {
        paddle.x = Math.max(0, paddle.x - paddle.speed);
      }

      ball.x += ball.dx;
      ball.y += ball.dy;
      animationId = requestAnimationFrame(update);
    }

    function startGame() {
      const shouldRestartLoop = isGameOver && lives <= 0;

      if (shouldRestartLoop) {
        fullReset();
      }

      isRunning = true;
      isGameOver = false;
      clearOverlay.style.display = 'none';
      setMessage('プレイ中です。すべてのブロックを壊してください。');

      if (shouldRestartLoop) {
        startLoop();
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Right' || e.key === 'ArrowRight') {
        rightPressed = true;
      } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
        leftPressed = true;
      } else if (e.code === 'Space') {
        e.preventDefault();
        startGame();
      }
    });

    document.addEventListener('keyup', function(e) {
      if (e.key === 'Right' || e.key === 'ArrowRight') {
        rightPressed = false;
      } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
        leftPressed = false;
      }
    });

    function bindHoldButton(button, direction) {
      const onStart = function(e) {
        e.preventDefault();
        if (direction === 'left') leftPressed = true;
        if (direction === 'right') rightPressed = true;
      };
      const onEnd = function(e) {
        e.preventDefault();
        if (direction === 'left') leftPressed = false;
        if (direction === 'right') rightPressed = false;
      };

      button.addEventListener('touchstart', onStart, { passive: false });
      button.addEventListener('touchend', onEnd, { passive: false });
      button.addEventListener('mousedown', onStart);
      button.addEventListener('mouseup', onEnd);
      button.addEventListener('mouseleave', onEnd);
    }

    bindHoldButton(leftBtn, 'left');
    bindHoldButton(rightBtn, 'right');

    easyBtn.addEventListener('click', function() {
      selectStartLevel(1);
    });

    normalBtn.addEventListener('click', function() {
      selectStartLevel(2);
    });

    hardBtn.addEventListener('click', function() {
      selectStartLevel(3);
    });

    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', function() {
      fullReset();
    });

    replayBtn.addEventListener('click', function() {
      clearOverlay.style.display = 'none';
      fullReset();
      startLoop();
    });

    updateLevelButtons();
    fullReset();
    startLoop();
  </script>
</body>
</html>
